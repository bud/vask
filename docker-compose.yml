services:
  vask-api:
    build: .
    ports:
      - "8420:8420"
    environment:
      # LLM providers (set in .env file)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Auth
      - VASK_API_KEYS=${VASK_API_KEYS:-}
      # Plugins
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - GOOGLE_ACCESS_TOKEN=${GOOGLE_ACCESS_TOKEN:-}
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - vask-data:/home/vask/.config/vask
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8420/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Redis for production session/rate-limit storage
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data

volumes:
  vask-data:
  # redis-data:
